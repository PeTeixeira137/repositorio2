<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>iTask Manager</title>
</head>
<body>
    
    <div class="container">
        <h1>iTask Manager</h1>
            <form id="form-tarefa" class="form-tarefa">
            <input type="text" id="input-titulo" placeholder="Título da tarefa" required>
            <textarea id="input-descricao" placeholder="Descrição da tarefa" required></textarea>
            <button type="submit">Adicionar tarefa</button>
            </form>
        <ul id="lista-tarefas" class="lista-tarefas"></ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
